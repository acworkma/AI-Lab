# Mount Sinai Data Science - Application Configuration
# This file is loaded by Typesafe Config (com.typesafe.config)

# Azure Key Vault settings
keyVault {
  # Key Vault URL - can be overridden by AZURE_KEY_VAULT_URI environment variable
  url = "https://kv-aks-auth.vault.azure.net/"
  
  # Comma-separated list of secret names in Key Vault
  keyList = "clarity-username,clarity-password,mongo-uri,storage-account-key"
  
  # Comma-separated list of Spark config keys to populate with the secrets
  # Must be in same order as keyList
  valueList = "clarity.username,clarity.password,mongo.uri,storage.accountKey"
}

# Database paths
database {
  # Default path for CSV files
  csvDatabase = "/data/csv/"
  
  # Default path for Parquet files
  parquetDatabase = "/data/parquet/"
  
  # Path to URI properties file (used in ONPREM mode)
  uris = "/config/database.uris"
}

# Data connection settings
data_connection {
  # Number of JDBC partitions for parallel reads
  partitionSize = 10
}
